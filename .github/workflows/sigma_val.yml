name: Sigma Validation Pipeline - joanfx

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  detection-engineering:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Sigma-CLI
        run: |
          pip install sigma-cli

      - name: 1. Validate Sigma Syntax
        run: |
          # It scans every folder for .yml files
          sigma check .

      - name: 2. Generate Splunk SPL
        run: |
          # It takes your sigma rules and converts them to splunk queries
          sigma convert -t splunk -p sysmon .