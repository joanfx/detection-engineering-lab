name: Sigma Validation Pipeline - joanfx

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  detection-engineering:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Sigma-CLI
        run: |
          pip install sigma-cli pySigma-backend-splunk pySigma-pipeline-sysmon pyyaml

      - name: 1. Validate Sigma Syntax
        run: |
          find . -name '*.yml' -not -path './.github/*' | xargs sigma check

      - name: 2. Generate Splunk SPL
        env:
          SPL_ENRICHMENT_PIPES: ${{ secrets.SPL_ENRICHMENT_PIPES }}
        run: |
          mkdir -p spl_output
          while IFS= read -r rule; do
            spl=$(sigma convert -t splunk -p sysmon "$rule" 2>/dev/null) || { echo "Skipping $rule (convert failed)"; continue; }
            python3 scripts/enrich_spl.py "$rule" "$spl" 2>/dev/null
          done < <(find . -name '*.yml' -not -path './.github/*')

      - name: Push Enriched SPL to Private Vault
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          git clone https://oauth2:${VAULT_TOKEN}@github.com/${{ github.repository_owner }}/detection-outputs.git vault
          cp spl_output/*.txt vault/
          cd vault
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add *.txt
          if git diff --staged --quiet; then
            echo "No changes detected — vault is already up to date."
          else
            git commit -m "chore: automated SPL update from detection-engineering pipeline"
            git push
            echo "SPL queries pushed to private vault successfully."
          fi