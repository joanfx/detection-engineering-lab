title: Suspicious PowerShell Encoded Command
id: 6e3d9caa-84d0-4e6a-b456-36290f4d3e24
status: experimental
description: |
  Detects the execution of PowerShell with base64 encoded commands using flags like -EncodedCommand, -enc, or -e. 
  Attackers frequently use this technique to obfuscate malicious scripts and bypass command-line logging or basic string-based detections 
  (MITRE ATT&CK T1059.001 – Command and Scripting Interpreter: PowerShell).
author: joanfx
date: 2026-04-08
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\\powershell.exe'
      - '\\pwsh.exe'
    CommandLine|contains:
      - ' -EncodedCommand '
      - ' -enc '
      - ' -en '
      - ' -e '
  condition: selection
level: high
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense-evasion
  - attack.t1027
falsepositives:
  - Legitimate administrative scripts used for system management (e.g., SCCM, Intune, or software installers).
  - Complex automation scripts where encoding is used to handle special characters in the command line.